# OmniTrain v2.1.0 Industrial Configuration
project: "Isaac_Sim_Robot"
version: "2.1.0"

# Scaled AI Backbone for RTX 5070 GPU
model:
  d_model: 1024       # Giga-depth for the 5070
  n_latents: 128      # Expanded memory
  num_layers: 12      # Deep reasoning
  n_heads: 16         # High-resolution spatial attention
  dropout: 0.1

# High-Fidelity Inputs (Isaac Sim Streams)
inputs:
  - id: "isaac_lidar_rtx"
    type: "lidar"
    hz: 60
    dim: 1024          # RTX-Raycasted Lidar (1024 points)
  - id: "isaac_vision_hd"
    type: "vision"
    hz: 30
    dim: 1024          # High-dim visual features

# Control Heads
heads:
  - id: "robot_drive"
    type: "regression"
    output_dim: 4      # [Velocity, Steering, Lift, Tilt]
    d_model: 1024
  - id: "obstacle_avoidance"
    type: "classification"
    num_classes: 3     # [SAFE, SLOW, STOP]
    d_model: 1024

# Safety Constraints (Sim-to-Real Guard)
safety_constraints:
  - sensor: "isaac_lidar_rtx"
    min: 0.10          # Emergency stop threshold
    max: 100.0
